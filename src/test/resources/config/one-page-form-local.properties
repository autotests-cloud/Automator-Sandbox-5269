# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Selenoid profile: frontend/ over HTTP (server cwd = template-project/frontend/)
baseUrl=http://localhost:3000/
basePath=

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=http://local.selenoid/video/
remoteUrl=http://local.selenoid/wd/hub

# Fast TestOps profile — Run 1/2: warm pool + lean browser + Allure minimal.
# Run 3 (diagnostic): -Denv=ci (full attachments + video).
# Strategy: docs/adr/004-fast-testops-warm-pool.md

# Allure report
allureReportMode=allure3

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app (same as ci)
baseUrl=https://qa-guru.github.io/one-page-form/
basePath=

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1280x900
headless=true
closeBrowserAfterEach=false

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
# videoFolder=
# remoteUrl=

# Console log
logToConsole=false
selenideLogToConsole=false
rootLogLevel=off

# CI profile: Selenoid cloud + Allure TestOps upload (GitHub Actions ui-tests.yml)

# Allure report
allureReportMode=allure3

# Runtime attachments → build/allure-results → allurectl → TestOps
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=true
attachPageSource=true
attachVideo=true
enableAllureSelenideListener=true

# Target app
baseUrl=https://qa-guru.github.io/one-page-form/
basePath=

# Browser / session
browser=chrome
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false

# Selenoid (video: enableVideo + attachVideo + videoFolder)
remoteUrl=https://user1:1234@selenoid.autotests.cloud/wd/hub
enableVnc=false
enableHar=false
enableVideo=true
videoFolder=https://selenoid.autotests.cloud/video/

# CI logs — quieter than local
logToConsole=false
selenideLogToConsole=false
rootLogLevel=warn

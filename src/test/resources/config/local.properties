# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Local HTTP: python -m http.server 3000 from templates/vanilla-ui/
baseUrl=http://localhost:3000/
basePath=

# Login-only file:// (header tests need HTTP):
# baseUrl=
# basePath=../frontend

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
